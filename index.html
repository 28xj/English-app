<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Hello English!</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Hello English">
<style>
:root{
  --bg:#f2f2f2;--card:#fff;--ink:#1a1a1a;--muted:#6b7280;
  --line:#e2e2e2;--soft:#f7f7f7;--accent:#3b72c8;--accent2:#4a9e6b;
  --good:#4a9e6b;--good-bg:#e8f4ed;--bad:#c0392b;--bad-bg:#fdecea;
  --chip:#ebebeb;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);padding:44px 8px 12px;display:flex;flex-direction:column;align-items:center;min-height:100vh;color:var(--ink);}
.container{width:100%;max-width:460px;display:flex;flex-direction:column;gap:10px;}
.nav{display:flex;gap:3px;background:var(--chip);padding:4px;border-radius:16px;}
.nav button{flex:1;padding:11px 2px;border:none;border-radius:11px;background:transparent;font-size:13px;font-weight:700;color:var(--muted);cursor:pointer;white-space:nowrap;transition:all .18s;}
.nav button.active{background:#fff;color:var(--ink);box-shadow:0 2px 8px rgba(0,0,0,.08);}
.panel{background:#fff;border-radius:20px;padding:16px;box-shadow:0 4px 16px rgba(0,0,0,.06);min-height:calc(100vh - 130px);display:flex;flex-direction:column;border:1px solid var(--line);overflow:hidden;position:relative;}
.hidden{display:none!important;}
@keyframes slideLeft{from{transform:translateX(0);opacity:1}to{transform:translateX(-100%);opacity:0}}
@keyframes slideInRight{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
.slide-out{animation:slideLeft .18s ease forwards;}
.slide-in{animation:slideInRight .18s ease forwards;}
@keyframes slideRight{from{transform:translateX(0);opacity:1}to{transform:translateX(100%);opacity:0}}
@keyframes slideInLeft{from{transform:translateX(-100%);opacity:0}to{transform:translateX(0);opacity:1}}
.slide-out-right{animation:slideRight .18s ease forwards;}
.slide-in-left{animation:slideInLeft .18s ease forwards;}
.flashcard{flex:1;display:flex;flex-direction:column;justify-content:center;gap:14px;margin-bottom:14px;}
.row{width:100%;padding:16px 16px;background:var(--soft);border-radius:16px;border:1px solid var(--line);}
.label{font-size:10.5px;color:var(--muted);text-transform:uppercase;margin-bottom:4px;font-weight:700;letter-spacing:.5px;}
.word-big{font-size:30px;font-weight:800;color:var(--ink);word-break:break-word;line-height:1.3;text-align:center;}
.word-mid{font-size:21px;color:#3d3d3d;word-break:break-word;text-align:center;}
.edit-pron{width:100%;border:none;background:transparent;text-align:center;font-size:17px;font-weight:700;color:#4a4a4a;outline:none;padding:3px;border-bottom:1.5px dashed transparent;transition:all .2s;}
.edit-pron:focus{border-bottom-color:var(--accent);background:#fff;border-radius:8px;}
.badge{display:inline-block;padding:3px 9px;border-radius:7px;font-size:10.5px;font-weight:700;margin-top:4px;}
.badge-tag{background:var(--ink);color:#fff;}
.badge-part{background:#9ca3af;color:#fff;margin-left:4px;}
.spk{background:var(--chip);border:none;border-radius:50%;width:33px;height:33px;font-size:15px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;margin-left:8px;vertical-align:middle;flex-shrink:0;}
.actions{display:flex;gap:8px;}
.btn-act{flex:1;padding:14px 4px;border-radius:14px;font-size:14px;font-weight:700;cursor:pointer;border:1.5px solid;transition:transform .1s,background .1s;}
.btn-act:active{transform:scale(.97);}
.btn-dunno{background:#fff;color:var(--bad);border-color:#e8c5c1;}
.btn-soso{background:var(--soft);color:var(--muted);border-color:var(--line);}
.btn-got{background:var(--ink);color:#fff;border-color:var(--ink);}
.qtype{display:inline-block;padding:4px 13px;border-radius:18px;font-size:12px;font-weight:700;}
.qt-c{background:#e8f4ed;color:var(--good);}
.qt-t{background:#e8eef8;color:var(--accent);}
.qt-f{background:#f0f0f0;color:var(--muted);}
.choices{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:6px;}
.choice{padding:17px 8px;border:1.5px solid var(--line);border-radius:14px;font-size:16px;font-weight:700;background:var(--soft);cursor:pointer;color:var(--ink);text-align:center;word-break:break-word;min-height:60px;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.choice:active{transform:scale(.97);}
.choice.correct{background:var(--good-bg);border-color:var(--good);color:var(--good);}
.choice.wrong{background:var(--bad-bg);border-color:var(--bad);color:var(--bad);}
.choice.reveal{background:var(--good-bg);border-color:var(--good);color:var(--good);}
.qinput{width:100%;padding:13px;border:1.5px solid var(--ink);border-radius:13px;font-size:18px;text-align:center;outline:none;font-weight:700;margin-top:8px;}
.qresult{margin-top:8px;padding:12px;border-radius:12px;font-weight:700;font-size:14px;display:none;text-align:center;}
.qr-ok{background:var(--good-bg);color:var(--good);}
.qr-no{background:var(--bad-bg);color:var(--bad);}
.q-dunno-btn{width:100%;margin-top:8px;padding:11px;border:1.5px dashed #b8c5d4;background:#f0f4fa;color:#4a6fa5;border-radius:12px;font-size:13px;font-weight:700;cursor:pointer;}
.wrong-log{margin-top:10px;background:var(--bad-bg);border-radius:12px;padding:12px;border:1px solid #f0c4c0;}
.wrong-log h4{font-size:13px;color:var(--bad);margin-bottom:6px;font-weight:700;}
.wrong-item{font-size:13px;color:var(--ink);padding:4px 0;border-bottom:1px solid #f5d5d2;}
.wrong-item:last-child{border:none;}
/* SENTENCE */
.sent-card{width:100%;padding:13px;background:var(--soft);border-radius:14px;border:1px solid var(--line);margin-bottom:8px;}
.sent-eng{font-size:19px;font-weight:800;color:var(--ink);line-height:1.4;}
.hl{color:var(--accent);}
.sent-zh{font-size:14px;color:var(--muted);}
.ai-bar{display:flex;gap:6px;align-items:center;margin-bottom:10px;background:var(--soft);padding:8px 10px;border-radius:12px;border:1px solid var(--line);}
.ai-bar label{font-size:11px;color:var(--muted);font-weight:700;white-space:nowrap;}
.ai-bar select{flex:1;padding:6px 8px;border:1px solid var(--line);border-radius:8px;font-size:12px;background:#fff;color:var(--ink);outline:none;}
.ai-key-row{display:flex;gap:6px;align-items:center;margin-bottom:8px;}
.ai-key-row input{flex:1;padding:8px 10px;border:1.5px solid var(--line);border-radius:10px;font-size:13px;outline:none;background:var(--soft);}
.ai-key-row input:focus{border-color:var(--accent);}
.ai-key-row label{font-size:11px;color:var(--muted);font-weight:700;white-space:nowrap;}
/* LIST */
.add-toggle{width:auto;align-self:flex-start;background:transparent;color:var(--muted);border:1px solid var(--line);padding:4px 10px;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;margin-bottom:8px;}
.add-section{background:var(--soft);border:1.5px dashed var(--line);border-radius:16px;padding:14px;margin-bottom:10px;}
.fg{display:flex;flex-direction:column;gap:5px;margin-bottom:8px;}
.fg label{font-size:12px;font-weight:700;color:var(--muted);}
.fg input,.fg select{padding:11px;border:1.5px solid var(--line);border-radius:12px;font-size:15px;outline:none;color:var(--ink);background:#fff;}
.fg input:focus,.fg select:focus{border-color:var(--accent);}
.list-c{flex:1;overflow-y:auto;max-height:290px;display:flex;flex-direction:column;gap:8px;}
.item{display:flex;justify-content:space-between;align-items:center;padding:11px;background:var(--soft);border-radius:14px;border:1px solid var(--line);}
.item-info{display:flex;flex-direction:column;gap:2px;max-width:57%;}
.item-word{font-weight:700;font-size:14px;color:var(--ink);word-break:break-word;}
.item-sub{font-size:11px;color:var(--muted);word-break:break-word;}
.item-btns{display:flex;gap:4px;align-items:center;}
.star-btn{background:transparent;border:none;font-size:17px;cursor:pointer;padding:3px;}
.ib{border:none;padding:5px 9px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;}
.ib-spk{background:var(--ink);color:#fff;border-radius:50%;width:29px;height:29px;padding:0;}
.ib-edit{background:var(--chip);color:var(--ink);}
.ib-del{background:var(--bad);color:#fff;}
.filterbar{display:flex;gap:5px;margin-bottom:9px;overflow-x:auto;padding-bottom:2px;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.filterbar::-webkit-scrollbar{display:none;}
.fbtn{flex-shrink:0;padding:4px 10px;border:1px solid var(--line);background:#fff;border-radius:16px;font-size:11px;cursor:pointer;white-space:nowrap;font-weight:700;color:var(--muted);}
.fbtn.active{background:var(--ink);color:#fff;border-color:var(--ink);}
.tools{display:flex;gap:7px;margin-top:11px;padding-top:11px;border-top:1px dashed var(--line);}
.tbtn{flex:1;border:none;padding:9px 4px;border-radius:11px;font-size:11px;font-weight:700;cursor:pointer;color:#fff;}
.tbtn.green{background:var(--good);}
.tbtn.blue{background:var(--accent);}
.tbtn.gray{background:#6b7280;}
.tbtn.red{background:#c0392b;}
.btn-main{background:var(--ink);color:#fff;border:none;padding:15px;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;width:100%;margin-top:8px;}
.btn-blue{background:var(--accent);}
.stats{font-size:12px;color:var(--muted);text-align:center;font-weight:600;}
/* DUNGEON */
.pbar{height:9px;background:#e6e6e6;border-radius:6px;overflow:hidden;}
.pfill{height:100%;border-radius:6px;transition:width .6s cubic-bezier(.34,1.2,.64,1);}
.intro-cap{position:absolute;bottom:14px;left:14px;right:14px;background:rgba(20,10,20,.82);border:1px solid #5a3a4a;border-radius:12px;padding:12px 14px;color:#ffe9c8;font-size:13px;font-weight:700;text-align:center;line-height:1.5;backdrop-filter:blur(3px);}
.toast{position:fixed;top:30%;left:50%;transform:translate(-50%,-50%) scale(.85);background:rgba(26,26,26,.92);color:#fff;padding:7px 16px;border-radius:30px;font-size:13px;font-weight:700;pointer-events:none;opacity:0;white-space:nowrap;transition:all .22s ease;z-index:9999;}
.toast.show{opacity:1;transform:translate(-50%,-50%) scale(1);}
.sig{position:fixed;bottom:10px;left:50%;transform:translateX(-50%);font-size:11px;color:#bbb;font-weight:600;letter-spacing:1px;white-space:nowrap;z-index:0;}
</style>
</head>
<body>
<div id="toast" class="toast"></div>
<div class="container">

  <!-- NAV -->
  <div class="nav">
    <button id="nav-task" onclick="switchView('task')">地城</button>
    <button id="nav-review" class="active" onclick="switchView('review')">複習</button>
    <button id="nav-sentence" onclick="switchView('sentence')">造句</button>
    <button id="nav-list" onclick="switchView('list')">清單</button>
  </div>

  <!-- 地城遊戲 -->
  <div id="view-task" class="panel hidden" style="padding:0;overflow:hidden;position:relative;min-height:calc(100vh - 110px);">
    <div id="game-root" style="position:absolute;inset:0;display:flex;flex-direction:column;">
      <div id="game-hud" style="padding:9px 12px 8px;background:rgba(10,8,16,.85);color:#fff;z-index:20;backdrop-filter:blur(4px);">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;">
          <div style="display:flex;flex-direction:column;gap:2px;">
            <div style="font-size:13px;font-weight:800;letter-spacing:.5px;"><span id="dev-trigger" onclick="devTap()" style="cursor:pointer;">⚔️</span> Lv.<span id="hud-level">1</span> <input id="hud-name-input" value="勇者" onchange="saveHeroName(this.value)" onblur="saveHeroName(this.value)" maxlength="8" style="background:transparent;border:none;border-bottom:none;color:#fff;font-size:13px;font-weight:800;width:48px;outline:none;padding:0;font-family:inherit;"></div>
            <div style="font-size:10px;color:#c9b8e8;">武器：<span id="hud-weapon">木劍</span></div>
          </div>
          <div style="text-align:right;display:flex;flex-direction:column;gap:2px;">
            <div style="font-size:12px;font-weight:700;color:#ffd86b;">💰 <span id="hud-coins">0</span> 題數幣</div>
            <div style="font-size:10px;color:#c9b8e8;">地城第 <span id="hud-floor">1</span> 層</div>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:6px;">
          <span style="font-size:9px;color:#9fe6ff;font-weight:700;white-space:nowrap;">今日 EXP</span>
          <div style="flex:1;height:8px;background:rgba(255,255,255,.12);border-radius:5px;overflow:hidden;">
            <div id="hud-exp-bar" style="height:100%;width:0%;background:linear-gradient(90deg,#4a9fe0,#9fe6ff);transition:width .4s;"></div>
          </div>
          <span style="font-size:9px;color:#c9b8e8;font-weight:700;white-space:nowrap;" id="hud-exp-text">0/50</span>
        </div>
      </div>
      <div id="game-stage" style="flex:1;position:relative;overflow:hidden;background:#1a1424;">
        <div id="stage-bg" style="position:absolute;inset:0;"></div>
        <div id="scene-bedroom" class="scene" style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;"></div>
        <div id="scene-battle" class="scene" style="position:absolute;inset:0;display:none;">
          <div id="monster-wrap" style="position:absolute;left:20%;bottom:22px;transform:translateX(-50%);display:flex;align-items:flex-end;justify-content:center;line-height:0;">
            <div style="position:absolute;bottom:-8px;left:50%;width:90px;height:12px;background:radial-gradient(ellipse,rgba(0,0,0,.5),transparent 70%);transform:translateX(-50%);"></div>
            <div id="monster-sprite" style="animation:idleFloat 2.4s ease-in-out infinite;line-height:0;"></div>
          </div>
          <div id="hero-wrap" style="position:absolute;right:24%;bottom:22px;transform:translateX(50%);display:flex;align-items:flex-end;justify-content:center;line-height:0;">
            <div style="position:absolute;bottom:-8px;left:50%;width:60px;height:10px;background:radial-gradient(ellipse,rgba(0,0,0,.5),transparent 70%);transform:translateX(-50%);"></div>
            <div id="hero-sprite" style="animation:idleFloat 2.6s ease-in-out infinite;line-height:0;"></div>
          </div>
          <div id="pet-sprite" style="position:absolute;right:8%;bottom:22px;animation:idleFloat 2.2s ease-in-out infinite;display:none;transition:left .25s ease,right .25s ease,transform .25s ease;z-index:12;line-height:0;"></div>
          <div id="pet-sprite2" style="position:absolute;right:2%;bottom:22px;animation:idleFloat 2.4s ease-in-out infinite;display:none;z-index:11;line-height:0;"></div>
          <!-- 血條層（固定，不受縮放影響）-->
          <div class="hpbar-layer" style="position:absolute;top:14px;left:6%;width:36%;z-index:14;">
            <div style="font-size:10px;color:#fff;margin-bottom:2px;text-shadow:0 1px 2px #000;" id="monster-name">怪物</div>
            <div style="height:8px;background:rgba(0,0,0,.55);border-radius:4px;overflow:hidden;border:1px solid rgba(255,255,255,.25);">
              <div id="monster-hp" style="height:100%;width:100%;background:linear-gradient(90deg,#e2433a,#ff7a52);transition:width .35s;"></div>
            </div>
          </div>
          <div class="hpbar-layer" style="position:absolute;top:14px;right:6%;width:36%;z-index:14;text-align:right;">
            <div style="font-size:10px;color:#9fe6ff;margin-bottom:2px;text-shadow:0 1px 2px #000;"><span id="battle-hero-name">勇者</span> Lv.<span id="battle-hero-lv">1</span></div>
            <div style="height:8px;background:rgba(0,0,0,.55);border-radius:4px;overflow:hidden;border:1px solid rgba(255,255,255,.25);">
              <div id="hero-hp" style="height:100%;width:100%;background:linear-gradient(90deg,#39b54a,#8be08b);transition:width .35s;"></div>
            </div>
          </div>
          <div id="combo-display" style="position:absolute;top:38%;left:50%;transform:translate(-50%,-50%);z-index:16;pointer-events:none;opacity:0;"></div>
          <div id="fx-layer" style="position:absolute;inset:0;pointer-events:none;z-index:15;"></div>
          <div style="position:absolute;bottom:0;left:0;right:0;height:90px;background:linear-gradient(180deg,rgba(40,28,20,.2),rgba(20,12,8,.85));"></div>
        </div>
      </div>
      <div id="game-controls" style="background:rgba(10,8,16,.92);padding:12px;z-index:20;">
        <div id="energy-row" style="display:none;align-items:center;gap:6px;margin-bottom:8px;">
          <span style="font-size:10px;color:#c77dff;font-weight:700;white-space:nowrap;">⚡技能</span>
          <div style="flex:1;height:9px;background:rgba(255,255,255,.12);border-radius:5px;overflow:hidden;">
            <div id="energy-bar" style="height:100%;width:0%;background:linear-gradient(90deg,#8a5ac8,#c77dff);transition:width .3s;"></div>
          </div>
          <button id="skill-btn" onclick="useSkill()" style="background:#3a2a4a;color:#777;border:1px solid #4a3a5a;border-radius:8px;padding:4px 10px;font-size:11px;font-weight:800;cursor:not-allowed;white-space:nowrap;">大絕</button>
        </div>
        <div id="battle-q" style="display:none;">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
            <div id="battle-q-label" style="color:#ffd86b;font-size:11px;font-weight:700;">選出正確英文（答對攻擊！）</div>
            <div id="battle-timer" style="font-size:16px;font-weight:900;color:#ffd86b;min-width:28px;text-align:right;">8s</div>
          </div>
          <div id="battle-q-text" style="text-align:center;color:#fff;font-size:17px;font-weight:800;margin-bottom:10px;padding:8px;background:rgba(255,255,255,.07);border-radius:10px;"></div>
          <div id="battle-choices" style="display:grid;grid-template-columns:1fr 1fr;gap:8px;"></div>
          <div id="battle-fill" style="display:none;">
            <input type="text" id="battle-fill-input" placeholder="輸入英文" autocomplete="off" autocapitalize="none" style="width:100%;padding:12px;border:1.5px solid #4a3a5a;border-radius:11px;background:#241830;color:#fff;font-size:16px;font-weight:700;text-align:center;outline:none;box-sizing:border-box;" onkeydown="if(event.key==='Enter')submitBattleFill()">
            <div style="display:flex;gap:8px;margin-top:8px;">
              <button onclick="submitBattleFill()" style="flex:1;padding:11px;border:none;border-radius:11px;background:linear-gradient(135deg,#8a5ac8,#c77dff);color:#fff;font-size:14px;font-weight:800;cursor:pointer;">確認攻擊</button>
              <button onclick="battleFillDunno()" style="background:#2a2038;color:#c9b8e8;border:1px solid #4a3a5a;border-radius:11px;padding:11px 14px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;">我不會</button>
            </div>
          </div>
          <button id="battle-next-btn" onclick="nextBattleQuestion()" style="display:none;width:100%;margin-top:8px;padding:13px;border:none;border-radius:11px;background:linear-gradient(135deg,#4a9fe0,#2050a0);color:#fff;font-size:15px;font-weight:800;cursor:pointer;">下一題 ▶</button>
        </div>
        <div id="game-buttons"></div>
        <button id="leave-battle-btn" onclick="leaveBattle()" style="display:none;width:100%;margin-top:8px;background:#2a1e38;color:#9a8aaa;border:1px solid #3a2e48;border-radius:10px;padding:8px;font-size:12px;font-weight:700;cursor:pointer;">回村莊</button>
      </div>
    </div>
  </div>

  <!-- 複習 -->
  <div id="view-review" class="panel">
    <div style="margin-bottom:8px;">
      <div class="stats" id="rstats">載入中...</div>
      <div class="filterbar" id="rfilter" style="margin-top:6px;"></div>
    </div>
    <div class="flashcard" id="review-card" ontouchstart="swStart(event)" ontouchend="swEnd(event)">
      <div class="row">
        <div class="label">單字 / 句子</div>
        <div style="display:flex;align-items:center;justify-content:center;">
          <span class="word-big" id="c-word"></span>
          <button class="spk" onclick="speakEl('c-word')">🔊</button>
        </div>
        <div style="text-align:center;"><span class="badge badge-tag" id="c-tag"></span><span class="badge badge-part" id="c-part"></span></div>
      </div>
      <div class="row">
        <div class="label">空耳唸法（點擊可改）</div>
        <input type="text" id="c-pron" class="edit-pron" value="" onchange="updatePron('review',this.value)">
      </div>
      <div class="row"><div class="label">中文意思</div><div class="word-mid" id="c-trans"></div></div>
    </div>
    <div class="actions">
      <button class="btn-act btn-dunno" onclick="score('dunno')">我不會</button>
      <button class="btn-act btn-soso" onclick="score('delta')">有點忘</button>
      <button class="btn-act btn-got" onclick="score('circle')">懂了</button>
    </div>
  </div>

  <!-- 填空 -->
  <!-- 造句 -->
  <div id="view-sentence" class="panel hidden">
    <!-- AI 設定浮層（長按生成按鈕才出現） -->

// 自動同步預設單字（每次載入靜默合併：補新字+更新標示+清理已知重複，保留學習進度）
(function autoSyncPreset(){
  try{
    if(localStorage.getItem('gm_cleared')==='1')return; // 使用者已清空，不自動塞回
    const byId={};words.forEach(w=>{byId[w.id]=w;});
    PRESET_DATA.words.forEach(pw=>{
      const ex=byId[pw.id];
      if(ex){
        if(ex.trans!==pw.trans||ex.part!==pw.part||ex.pronounce!==pw.pronounce||ex.tag!==pw.tag){
          ex.trans=pw.trans;ex.part=pw.part;ex.pronounce=pw.pronounce;ex.tag=pw.tag;
        }
      }else{
        const k=(pw.word||'').trim().toLowerCase();
        const dup=words.find(w=>(w.word||'').trim().toLowerCase()===k&&w.tag===pw.tag);
        if(!dup)words.push({...pw});
      }
    });
    // 清理已知的重複所有格 id
    const deadIds=new Set([1781898019454,1781898019591,1781898019728,1781898019865,1781898020002,1781898020139]);
    words=words.filter(w=>!deadIds.has(w.id));
    (PRESET_DATA.tagTypes||[]).forEach(t=>{if(!tagTypes.includes(t))tagTypes.push(t);});
    localStorage.setItem('gm_words_v3',JSON.stringify(words));
    localStorage.setItem('gm_tags_v3',JSON.stringify(tagTypes));
  }catch(e){}
})();

  game.petOrder=game.petOrder.filter(i=>game.ownedPets.includes(i));
  game.ownedPets.forEach(i=>{if(!game.petOrder.includes(i))game.petOrder.push(i);});

function hsl2hex(h,s,l){
  s/=100;l/=100;const k=n=>(n+h/30)%12;const a=s*Math.min(l,1-l);
  const f=n=>{const c=l-a*Math.max(-1,Math.min(k(n)-3,Math.min(9-k(n),1)));return Math.round(255*c).toString(16).padStart(2,'0');};
  return '#'+f(0)+f(8)+f(4);
}
function monsterColor(lv){
  // 每隻怪物獨立色相，60隻轉一圈，越高等越鮮豔
  const hue=(lv*47)%360; // 47與360互質→分散
  const sat=45+Math.min(lv,40)*0.9;
  return{
    body:hsl2hex(hue,sat,52),
    dark:hsl2hex(hue,sat,30),
    glow:hsl2hex(hue,Math.min(sat+20,100),65)
  };
}

function loadGame(){
  let g=null;try{g=JSON.parse(localStorage.getItem('gm_game'));}catch(e){}
  if(!g)g=defaultGame();
  const d=defaultGame();for(const k in d)if(g[k]===undefined)g[k]=d[k];
  // 補發起始武器給舊玩家（劍/拳/弓/杖）
  [0,6,12,18].forEach(w=>{if(!g.ownedWeapons.includes(w))g.ownedWeapons.push(w);});
  // 初始化寵物出戰順序（舊存檔）
  if(!Array.isArray(g.petOrder))g.petOrder=[];
  if(g.petOrder.length===0&&g.ownedPets&&g.ownedPets.length>0){
    if(g.pet>=0&&g.ownedPets.includes(g.pet))g.petOrder.push(g.pet);
    g.ownedPets.forEach(i=>{if(!g.petOrder.includes(i))g.petOrder.push(i);});
  }
  return g;
}

function todayStr(){const d=new Date();return`${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;}

function levelGainFromQuiz(n){let gain=0,threshold=20;while(n>=threshold){gain++;threshold*=2;}return gain;}
function gameOnCorrect(){sfxCorrect();
  if(game.quizDate!==todayStr()){game.quizDate=todayStr();game.quizToday=0;game.lvlGainedToday=0;}
  game.quizToday++;game.coins++;
  if(game.dailyDate!==todayStr()){game.dailyDate=todayStr();game.dailyCorrect=0;game.dailyClaimed=false;}
  game.dailyCorrect=(game.dailyCorrect||0)+1;
  const shouldGain=levelGainFromQuiz(game.quizToday);
  if(shouldGain>game.lvlGainedToday){
    const up=shouldGain-game.lvlGainedToday;
    game.level+=up;game.lvlGainedToday=shouldGain;
    if(game.level>60)game.level=60;
    toast(`🎉 升級！現在 Lv.${game.level}`);
  }
  saveGame();refreshHUD();
}
function battleParams(heroLv,monLv){
  const diff=monLv-heroLv;
  let monHp=100+Math.max(0,diff)*18;
  let monDmg=12+Math.max(0,diff)*6;
  if(diff<0)monDmg=Math.max(6,12+diff*1.5);
  let heroDmg=20*weaponPower(game.weapon);
  if(diff>0)heroDmg=heroDmg*(1-Math.min(diff*0.04,0.45));
  return{monHp:Math.round(monHp),monDmg:Math.round(monDmg),heroDmg:Math.round(heroDmg),diff};
}
function difficultyTag(heroLv,monLv){
  const d=monLv-heroLv;
  if(d<=0)return{txt:'可輕鬆擊敗',color:'#9ed46b'};
  if(d<=2)return{txt:'有挑戰，連續答對可勝',color:'#ffd86b'};
  if(d<=5)return{txt:'高難度，要幾乎全對',color:'#ff9a52'};
  if(d<=9)return{txt:'極限挑戰，稍錯就死',color:'#ff6a4a'};
  return{txt:'幾乎不可能，當心被秒',color:'#ff4a4a'};
}

function syncPresetWords(){
  localStorage.removeItem('gm_cleared'); // 手動同步＝想要單字，解除清空鎖
  // 同步預設資料：用 id 比對更新已存在的（中文/詞性/空耳/標籤），用文字比對補入新字，並移除預設已刪除的重複字
  const byId={};words.forEach(w=>{byId[w.id]=w;});
  const presetIds=new Set(PRESET_DATA.words.map(p=>p.id));
  let added=0,updated=0,removed=0;
  // 1. 更新或補入
  PRESET_DATA.words.forEach(pw=>{
    const ex=byId[pw.id];
    if(ex){
      // 保留學習狀態(status)、星號(star)、答錯/我不會次數，其餘用預設最新值
      if(ex.trans!==pw.trans||ex.part!==pw.part||ex.pronounce!==pw.pronounce||ex.tag!==pw.tag){
        ex.trans=pw.trans;ex.part=pw.part;ex.pronounce=pw.pronounce;ex.tag=pw.tag;updated++;
      }
    }else{
      // 沒有這個 id，再用文字比對避免重複
      const k=(pw.word||'').trim().toLowerCase();
      const dup=words.find(w=>(w.word||'').trim().toLowerCase()===k&&w.tag===pw.tag);
      if(!dup){words.push({...pw});added++;}
    }
  });
  // 2. 移除「預設曾經有、但已被我清掉的重複所有格」——只清掉那6個已知重複id
  const deadIds=new Set([1781898019454,1781898019591,1781898019728,1781898019865,1781898020002,1781898020139]);
  const before=words.length;
  words=words.filter(w=>!deadIds.has(w.id));
  removed=before-words.length;
  (PRESET_DATA.tagTypes||[]).forEach(t=>{if(!tagTypes.includes(t))tagTypes.push(t);});
  save();
  closeDevPanel();
  toast('同步完成：新增'+added+'、更新'+updated+'、清理'+removed);
}

function disableDevMode(){
  game.devMode=false;
  // 還原備份
  if(game.devBackup){
    game.level=game.devBackup.level;
    game.coins=game.devBackup.coins;
    game.floor=game.devBackup.floor;
    game.ownedWeapons=game.devBackup.ownedWeapons;
    game.ownedSkins=game.devBackup.ownedSkins;
    game.ownedPets=game.devBackup.ownedPets;
    // 確保裝備的東西還擁有，否則重設
    if(!game.ownedWeapons.includes(game.weapon))game.weapon=game.ownedWeapons[0]||0;
    if(!game.ownedSkins.includes(game.skin))game.skin=game.ownedSkins[0]||0;
    if(game.pet>=0&&!game.ownedPets.includes(game.pet))game.pet=-1;
    game.devBackup=null;
  }
  saveGame();refreshHUD();closeDevPanel();toast('已關閉工作模式，數值還原');
  if(document.getElementById('village-hero'))renderBedroom(false);
}
function enableDevMode(){
  // 備份原本數值（只在第一次進入時備份）
  if(!game.devBackup){
    game.devBackup={level:game.level,coins:game.coins,floor:game.floor,
      ownedWeapons:[...game.ownedWeapons],ownedSkins:[...game.ownedSkins],ownedPets:[...game.ownedPets]};
  }
  game.ownedWeapons=[];for(let i=0;i<30;i++)game.ownedWeapons.push(i);
  game.ownedSkins=[];for(let i=0;i<30;i++)game.ownedSkins.push(i);
  game.ownedPets=[];for(let i=0;i<PETS.length;i++)game.ownedPets.push(i);
  game.coins=999999;
  game.level=99;
  game.devMode=true;
  saveGame();refreshHUD();
  toast('工作模式啟動！全解鎖');
  if(document.getElementById('village-hero'))renderBedroom(false);
}

    +'<button onclick="closeDevJump()" style="flex:1;background:#2a2038;color:#c9b8e8;border:1px solid #4a3a5a;padding:11px;border-radius:10px;font-weight:700;cursor:pointer;">取消</button>'
    +'</div></div>';
  document.body.appendChild(p);
  setTimeout(()=>{const i=document.getElementById('dev-floor');if(i){i.focus();i.select();}},100);
}
function doDevJump(){
  const i=document.getElementById('dev-floor');
  const n=Math.max(1,Math.min(100,parseInt(i&&i.value)||1));
  const x=document.getElementById('dev-jump');if(x)x.remove();
  game.floor=n;saveGame();refreshHUD();
  startFloor(n);
}
function refreshHUD(){
  setT('hud-level',game.level);setT('hud-weapon',WEAPONS[game.weapon]);
  const hni=document.getElementById('hud-name-input');if(hni&&document.activeElement!==hni)hni.value=game.heroName||'勇者';
  setT('hud-coins',game.coins);setT('hud-floor',game.floor);
  if(game.quizDate!==todayStr()){game.quizDate=todayStr();game.quizToday=0;game.lvlGainedToday=0;}
  const done=game.quizToday;
  let th=20,lastTh=0;
  while(done>=th){lastTh=th;th*=2;}
  const inSeg=done-lastTh,segLen=th-lastTh;
  const pct=Math.max(0,Math.min(100,inSeg/segLen*100));
  const bar=document.getElementById('hud-exp-bar');
  const txt=document.getElementById('hud-exp-text');
  if(bar)bar.style.width=pct+'%';if(txt)txt.innerText=`${done}/${th}題`;
}
function setT(id,v){const e=document.getElementById(id);if(e)e.innerText=v;}

let gameScene='bedroom';
function showScene(name){
  gameScene=name;
  document.getElementById('scene-bedroom').style.display=(name==='bedroom')?'flex':'none';
  document.getElementById('scene-battle').style.display=(name==='battle')?'block':'none';
  const lb=document.getElementById('leave-battle-btn');
  if(lb)lb.style.display=(name==='battle')?'block':'none';
}
function renderTask(){refreshHUD();game=loadGame();checkDailyLogin();refreshHUD();renderBedroom(!game.seenIntro);showScene('bedroom');}
function checkDailyLogin(){
  const today=todayStr();
  if(game.loginDate!==today){
    // 連續登入判斷
    const y=new Date();y.setDate(y.getDate()-1);
    const yStr=`${y.getFullYear()}-${y.getMonth()+1}-${y.getDate()}`;
    if(game.loginDate===yStr)game.loginStreak=(game.loginStreak||0)+1;
    else game.loginStreak=1;
    game.loginDate=today;
    // 登入獎勵：天數 x5 幣
    const bonus=Math.min(game.loginStreak,7)*5;
    game.coins+=bonus;
    setTimeout(()=>toast(`📅 連續登入 ${game.loginStreak} 天！+${bonus}幣`),400);
  }
  if(game.dailyDate!==today){game.dailyDate=today;game.dailyCorrect=0;game.dailyClaimed=false;}
  saveGame();
}
function getDailyGoal(){return 30;}
function claimDaily(){
  if(game.dailyClaimed){toast('今日獎勵已領取');return;}
  if((game.dailyCorrect||0)<getDailyGoal()){toast('還沒達成今日目標');return;}
  game.dailyClaimed=true;game.coins+=50;saveGame();refreshHUD();
  toast('🎁 每日任務完成！+50幣');
  renderBedroom(false);
}

// 圓形可拖曳搖桿
let _joyActive=false,_joyUpFired=false,_joyDir=0,_joyTimer=null;
function setupJoystick(){
  const joy=document.getElementById('joystick');
  const knob=document.getElementById('joy-knob');
  if(!joy||!knob)return;
  let cx=0,cy=0,R=30;
  const start=(px,py)=>{const r=joy.getBoundingClientRect();cx=r.left+r.width/2;cy=r.top+r.height/2;_joyActive=true;_joyUpFired=false;_joyDir=0;
    if(_joyTimer)clearInterval(_joyTimer);
    _joyTimer=setInterval(()=>{if(_joyDir!==0)walkHero(_joyDir);},140);};
  const move=(px,py)=>{
    if(!_joyActive)return;
    let dx=px-cx,dy=py-cy;
    const dist=Math.hypot(dx,dy);
    if(dist>R){dx=dx/dist*R;dy=dy/dist*R;}
    knob.style.transform='translate(calc(-50% + '+dx+'px),calc(-50% + '+dy+'px))';
    // 記錄方向，由計時器穩定移動（避免一拖到底）
    _joyDir=(dx>8)?1:(dx<-8)?-1:0;
    // 上推進入
    if(dy<-18&&!_joyUpFired){_joyUpFired=true;enterZone();}
  };
  const end=()=>{_joyActive=false;_joyDir=0;if(_joyTimer){clearInterval(_joyTimer);_joyTimer=null;}knob.style.transform='translate(-50%,-50%)';};
  joy.addEventListener('touchstart',e=>{const t=e.touches[0];start(t.clientX,t.clientY);e.preventDefault();},{passive:false});
  joy.addEventListener('touchmove',e=>{const t=e.touches[0];move(t.clientX,t.clientY);e.preventDefault();},{passive:false});
  joy.addEventListener('touchend',e=>{end();e.preventDefault();},{passive:false});
  joy.addEventListener('mousedown',e=>{start(e.clientX,e.clientY);});
  document.addEventListener('mousemove',e=>{if(_joyActive)move(e.clientX,e.clientY);});
  document.addEventListener('mouseup',()=>{if(_joyActive)end();});
}

let _hjActive=false,_hjDir=0,_hjTimer=null,_hjUp=false;
function setupHouseJoystick(){
  const joy=document.getElementById('house-joystick'),knob=document.getElementById('house-knob');
  if(!joy||!knob)return;
  let cx=0,cy=0,R=26;
  const start=(px,py)=>{const r=joy.getBoundingClientRect();cx=r.left+r.width/2;cy=r.top+r.height/2;_hjActive=true;_hjUp=false;_hjDir=0;if(_hjTimer)clearInterval(_hjTimer);_hjTimer=setInterval(()=>{if(_hjDir!==0)walkHouse(_hjDir);},140);};
  const move=(px,py)=>{if(!_hjActive)return;let dx=px-cx,dy=py-cy;const d=Math.hypot(dx,dy);if(d>R){dx=dx/d*R;dy=dy/d*R;}knob.style.transform='translate(calc(-50% + '+dx+'px),calc(-50% + '+dy+'px))';_hjDir=(dx>8)?1:(dx<-8)?-1:0;if(dy<-18&&!_hjUp){_hjUp=true;enterBed();}};
  const end=()=>{_hjActive=false;_hjDir=0;if(_hjTimer){clearInterval(_hjTimer);_hjTimer=null;}knob.style.transform='translate(-50%,-50%)';};
  joy.addEventListener('touchstart',e=>{const t=e.touches[0];start(t.clientX,t.clientY);e.preventDefault();},{passive:false});
  joy.addEventListener('touchmove',e=>{const t=e.touches[0];move(t.clientX,t.clientY);e.preventDefault();},{passive:false});
  joy.addEventListener('touchend',e=>{end();e.preventDefault();},{passive:false});
  joy.addEventListener('mousedown',e=>start(e.clientX,e.clientY));
  document.addEventListener('mousemove',e=>{if(_hjActive)move(e.clientX,e.clientY);});
  document.addEventListener('mouseup',()=>{if(_hjActive)end();});
}

let _yardDragIdx=null;
function setupYardDrag(){
  const yard=document.getElementById('pet-yard');
  if(!yard)return;
  yard.querySelectorAll('.yard-pet').forEach(slot=>{
    // 桌面拖曳
    slot.addEventListener('dragstart',e=>{_yardDragIdx=+slot.dataset.idx;slot.style.opacity='.4';});
    slot.addEventListener('dragend',e=>{slot.style.opacity='1';});
    slot.addEventListener('dragover',e=>e.preventDefault());
    slot.addEventListener('drop',e=>{e.preventDefault();yardDropTo(+slot.dataset.idx);});
    // 手機觸控拖曳
    slot.addEventListener('touchstart',e=>{_yardDragIdx=+slot.dataset.idx;slot.querySelector('.yp-sprite').style.transform='scale(1.2)';},{passive:true});
    slot.addEventListener('touchend',e=>{
      slot.querySelector('.yp-sprite').style.transform='';
      const t=e.changedTouches[0];
      const yard2=document.getElementById('pet-yard');const r=yard2.getBoundingClientRect();
      const relX=(t.clientX-r.left)/r.width;
      // 放開位置換算成目標索引
      const n=game.petOrder.length;
      let to=Math.round(relX*(n-1));
      to=Math.max(0,Math.min(n-1,to));
      yardDropTo(to);
    },{passive:true});
  });
}
function yardDropTo(to){
  if(_yardDragIdx===null||to===_yardDragIdx){_yardDragIdx=null;return;}
  const it=game.petOrder.splice(_yardDragIdx,1)[0];
  game.petOrder.splice(to,0,it);
  _yardDragIdx=null;
  syncPetOrder();saveGame();refreshHUD();
  renderPetYard();
  // 更新「出戰X隻」文字（重開比較簡單）
  if(to===0||true){toast(PETS[game.pet].name+' 設為出戰！');}
}
function petPlay(action){
  const today=todayStr();
  if(game.petPlayDate!==today){game.petPlayDate=today;game.petPlayCount=0;}
  const cap=8;
  if((game.petPlayCount||0)>=cap){toast('今天玩夠囉，明天再來陪牠們！');return;}
  syncPetOrder();
  const n=game.petOrder.length;
  if(n===0)return;
  const r=5*n; // 基礎5幣 × 寵物數
  game.coins+=r;
  game.petPlayCount=(game.petPlayCount||0)+1;
  saveGame();refreshHUD();
  petCry();sfxCoin();
  const hero=document.getElementById('play-hero');
  const heart=document.getElementById('play-heart');
  const food=document.getElementById('play-food');
  // 全部寵物一起反應
  const sprites=document.querySelectorAll('#pet-yard .yp-sprite');
  if(action==='feed'){
    if(hero)hero.style.transform='scaleX(-1) translateX(-8px)';
    if(food){food.style.opacity='1';food.style.bottom='110px';}
    sprites.forEach((s,k)=>setTimeout(()=>{s.style.transition='transform .2s';s.style.transform='scale(1.15)';setTimeout(()=>s.style.transform='',250);},k*60));
    setTimeout(()=>{if(food)food.style.opacity='0';if(hero)hero.style.transform='scaleX(-1)';},600);
  }else if(action==='pet'){
    if(hero)hero.style.transform='scaleX(-1) translateX(-14px)';
    sprites.forEach((s,k)=>setTimeout(()=>{s.style.transition='transform .15s';s.style.transform='rotate(-7deg)';setTimeout(()=>{s.style.transform='rotate(7deg)';},150);setTimeout(()=>{s.style.transform='';},320);},k*50));
    setTimeout(()=>{if(hero)hero.style.transform='scaleX(-1)';},500);
  }else{
    sprites.forEach((s,k)=>setTimeout(()=>{s.style.transition='transform .2s';s.style.transform='translateY(-20px) scale(1.05)';setTimeout(()=>s.style.transform='',280);},k*70));
    if(hero){hero.style.transform='scaleX(-1) translateY(-12px)';setTimeout(()=>{if(hero)hero.style.transform='scaleX(-1)';},350);}
  }
  if(heart){heart.style.opacity='1';heart.style.bottom='170px';setTimeout(()=>{if(heart){heart.style.opacity='0';heart.style.bottom='190px';}},700);}

function escapeCreep(){
  if(!escState)return;
  // 怪物持續逼近（答題卡關時更危險）
  escState.monX+=escState.atGate?0.9:0.5;
  if(escState.monX>=escState.heroX){ // 追上角色
    clearInterval(_escCreep);_escCreep=null;
    escapeCaught();return;
  }
  updateEscapeScene();
}
function walkEscape(dir){
  if(!escState||escState.atGate)return;
  escState.heroX=Math.max(8,Math.min(92,escState.heroX+dir*2.5));
  // 走到門口（gatePos附近）觸發答題
  if(dir>0&&Math.abs(escState.heroX-escState.gatePos)<5){
    escState.heroX=escState.gatePos;
    openEscapeGate();
  }
  updateEscapeScene();
}
function updateEscapeScene(){
  const layer=document.getElementById('escape-layer');if(!layer||!escState)return;
  layer.innerHTML=
    '<div style="position:absolute;bottom:24%;left:'+escState.monX+'%;transform:translateX(-50%);transition:left .3s linear;">'+monsterSprite(Math.min(escState.gate*4+8,60),"idle")+'</div>'
    +'<div style="position:absolute;bottom:24%;left:'+escState.heroX+'%;transform:translateX(-50%) scaleX(-1);transition:left .12s linear;">'+heroSprite(game.skin,game.level,'idle',60,game.weapon)+'</div>'
    +(game.pet>=0&&PETS[game.pet]?'<div style="position:absolute;bottom:24%;left:'+(escState.heroX-7)+'%;transform:translateX(-50%) scaleX(-1);transition:left .12s linear;animation:idleFloat 2.2s ease-in-out infinite;">'+petSprite(game.pet,34)+'</div>':'')

    +'<div style="position:absolute;bottom:24%;left:'+escState.gatePos+'%;transform:translateX(-50%);"><div style="width:48px;height:66px;border-radius:24px 24px 0 0;background:radial-gradient(ellipse at 50% 60%,#bfe8ff,#4a9fe0 45%,#2050a0);box-shadow:0 0 16px #4a9fe0;border:3px solid #1a3050;"></div></div>'
    // 進度
    +'<div style="position:absolute;top:10px;left:50%;transform:translateX(-50%);background:rgba(10,8,20,.7);padding:5px 14px;border-radius:14px;color:#aee0ff;font-size:11px;font-weight:700;white-space:nowrap;">已逃出 '+escState.gate+' / '+escState.total+' 道門</div>';
}
function openEscapeGate(){
  if(escState.atGate)return;
  escState.atGate=true;
  // 出題
  document.getElementById('battle-q').style.display='block';
  const lbl=document.getElementById('battle-q-label');if(lbl)lbl.innerText='答對才能開門逃跑！';
  let pool=words.filter(w=>w.status==='dunno'||w.status==='delta');
  if(pool.length<3||Math.random()<0.4)pool=words;
  const w=pool[Math.floor(Math.random()*pool.length)];
  escState.cur=w;
  document.getElementById('battle-q-text').innerText=w.trans;
  const timerEl=document.getElementById('battle-timer');if(timerEl)timerEl.innerText='';
  const box=document.getElementById('battle-choices');
  box.innerHTML='';
  const wrongs=pickDistractors(w,3);
  const opts=[...wrongs,w].sort(()=>Math.random()-.5);
  opts.forEach(o=>{
    const btn=document.createElement('button');
    btn.style.cssText='padding:13px 8px;border:1.5px solid #3a5a7a;border-radius:11px;background:#1a2838;color:#fff;font-size:14px;font-weight:700;cursor:pointer;word-break:break-word;';
    btn.innerText=o.word;
    btn.onclick=()=>escapeAnswer(o.id===w.id,btn);
    box.appendChild(btn);
  });
}
function escapeAnswer(correct,btn){
  const box=document.getElementById('battle-choices');
  Array.from(box.children).forEach(b=>b.style.pointerEvents='none');
  if(correct){
    if(btn){btn.style.background='#39b54a';btn.style.borderColor='#39b54a';}
    if(escState.cur)say(escState.cur.word);
    if(escState.cur)mark(escState.cur.id,'circle');
    gameOnCorrect();
    escState.gate++;
    toast('開門了！繼續逃');
    setTimeout(()=>{
      document.getElementById('battle-q').style.display='none';
      if(escState.gate>=escState.total){escapeWin();return;}
      // 角色穿過門，門往前移、怪物稍微被拉開
      escState.atGate=false;
      escState.heroX=Math.max(8,escState.heroX-18);
      escState.monX=Math.max(2,escState.monX-8);
      escState.gatePos=Math.min(90,escState.gatePos+6+Math.random()*8);
      if(escState.gatePos-escState.heroX<20)escState.gatePos=escState.heroX+24;
      updateEscapeScene();
    },800);
  }else{
    if(btn){btn.style.background='#c0392b';btn.style.borderColor='#c0392b';}
    Array.from(box.children).forEach(b=>{if(b.innerText===(escState.cur&&escState.cur.word)){b.style.background='#39b54a';b.style.borderColor='#39b54a';}});
    if(escState.cur){mark(escState.cur.id,'delta');setTimeout(()=>say(escState.cur.word),400);}
    escState.monX+=10; // 答錯怪物大步逼近
    toast('答錯！怪物逼近');
    setTimeout(()=>{
      document.getElementById('battle-q').style.display='none';
      escState.atGate=false;
      if(escState.monX>=escState.heroX){escapeCaught();return;}
      updateEscapeScene();
    },1200);
  }
}
function setupEscJoystick(){
  const joy=document.getElementById('esc-joystick'),knob=document.getElementById('esc-knob');
  if(!joy||!knob)return;
  let cx=0,cy=0,R=28;
  const start=(px,py)=>{const r=joy.getBoundingClientRect();cx=r.left+r.width/2;cy=r.top+r.height/2;_escJoyActive=true;_escJoyDir=0;if(_escJoyTimer)clearInterval(_escJoyTimer);_escJoyTimer=setInterval(()=>{if(_escJoyDir!==0)walkEscape(_escJoyDir);},120);};
  const move=(px,py)=>{if(!_escJoyActive)return;let dx=px-cx,dy=py-cy;const d=Math.hypot(dx,dy);if(d>R){dx=dx/d*R;dy=dy/d*R;}knob.style.transform='translate(calc(-50% + '+dx+'px),calc(-50% + '+dy+'px))';_escJoyDir=(dx>8)?1:(dx<-8)?-1:0;};
  const end=()=>{_escJoyActive=false;_escJoyDir=0;if(_escJoyTimer){clearInterval(_escJoyTimer);_escJoyTimer=null;}knob.style.transform='translate(-50%,-50%)';};
  joy.addEventListener('touchstart',e=>{const t=e.touches[0];start(t.clientX,t.clientY);e.preventDefault();},{passive:false});
  joy.addEventListener('touchmove',e=>{const t=e.touches[0];move(t.clientX,t.clientY);e.preventDefault();},{passive:false});
  joy.addEventListener('touchend',e=>{end();e.preventDefault();},{passive:false});
  joy.addEventListener('mousedown',e=>start(e.clientX,e.clientY));
  document.addEventListener('mousemove',e=>{if(_escJoyActive)move(e.clientX,e.clientY);});
  document.addEventListener('mouseup',()=>{if(_escJoyActive)end();});
}
function stopEscCreep(){if(_escCreep){clearInterval(_escCreep);_escCreep=null;}if(_escJoyTimer){clearInterval(_escJoyTimer);_escJoyTimer=null;}_escJoyActive=false;}

}
function cleanupEscape(){
  stopEscCreep();
  const layer=document.getElementById('escape-layer');if(layer)layer.style.display='none';
  const mw=document.getElementById('monster-wrap'),hw=document.getElementById('hero-wrap');

function enterDungeon(){game.seenIntro=true;saveGame();startFloor(game.floor);}
let battleState={};
function startFloor(floor){
  battleState.revenge=false;
  const _mw=document.getElementById('monster-wrap');if(_mw)_mw.style.scale='1';
  const _ms=document.getElementById('monster-sprite');if(_ms)_ms.style.filter='';
  battleState.floor=floor;
  const monLv=Math.min(floor,100);
  battleState.monLv=monLv;

let _battleTimer=null;
let _battleTimerSec=0;
function clearBattleTimer(){if(_battleTimer){clearInterval(_battleTimer);_battleTimer=null;}}
function startBattleTimer(w,box){
  clearBattleTimer();
  // 依難度給秒數：基本7秒，單字越長/句子給更多時間
  let secs=7;
  const wlen=(w.word||'').length;
  if(w.word&&w.word.includes(' '))secs+=5;      // 句子 +5
  else if(wlen>=10)secs+=4;                       // 長單字 +4
  else if(wlen>=7)secs+=2;                        // 中等 +2
  if(document.getElementById('battle-fill')&&document.getElementById('battle-fill').style.display!=='none')secs=30; // 填空固定30秒
  _battleTimerSec=secs;
  const timerEl=document.getElementById('battle-timer');
  if(timerEl){timerEl.innerText=_battleTimerSec+'s';timerEl.style.color='#ffd86b';}
  _battleTimer=setInterval(()=>{
    _battleTimerSec--;
    if(timerEl){
      timerEl.innerText=_battleTimerSec+'s';
      if(_battleTimerSec<=3)timerEl.style.color='#ff4a4a';
    }
    if(_battleTimerSec<=0){
      clearBattleTimer();
      // 時間到！怪物攻擊
      Array.from(box.children).forEach(b=>{
        b.style.pointerEvents='none';
        if(b.dataset.correct==='1'){b.style.background='#39b54a';b.style.borderColor='#39b54a';}
      });
      if(timerEl)timerEl.innerText='⏰';
      if(battleState.combo>0){battleState.combo=0;updateComboUI();}
      if(battleState.ultArmed){battleState.ultArmed=false;battleState.energy=0;updateEnergyUI();}
      toast('太慢了！怪物反擊！');
      monsterAttack();
    }
  },1000);
}
let _recentWords=[];

  const b=document.getElementById('battle-next-btn');

  // 答完先把作答區鎖住，等玩家看完答案
  const box=document.getElementById('battle-choices');

function nextBattleQuestion(){
  clearBattleTimer();
  const nb=document.getElementById('battle-next-btn');if(nb)nb.style.display='none';
  // 清掉填空殘留的「正確：」提示
  const _fa=document.getElementById('battle-fill');
  if(_fa){const ex=_fa.querySelectorAll('.fill-ans-tip');ex.forEach(e=>e.remove());}
  document.getElementById('battle-q').style.display='block';
  if(words.length<4){document.getElementById('battle-q-text').innerText="請先新增更多單字！";return;}
  let w;
  if(battleState.revenge&&battleState.revengePool&&battleState.revengePool.length>0){
    const pool=battleState.revengePool;
    let tries=0;
    do{w=pool[Math.floor(Math.random()*pool.length)];tries++;}
    while(_recentWords.includes(w.word)&&tries<10&&pool.length>5);
  }else{
    // 避免最近出過的字（記錄最近1/3題庫量，最多12）
    const avoid=Math.min(Math.floor(words.length/3),12);
    let tries=0;
    do{w=words[Math.floor(Math.random()*words.length)];tries++;}
    while(_recentWords.includes(w.word)&&tries<20);
  }
  _recentWords.push(w.word);
  const keep=Math.min(Math.floor(words.length/3),12);
  if(_recentWords.length>keep)_recentWords.shift();
  const timerEl=document.getElementById('battle-timer');
  if(timerEl){timerEl.innerText='8s';timerEl.style.color='#ffd86b';}
  const box=document.getElementById('battle-choices');
  const fillArea=document.getElementById('battle-fill');
  // 只有「大絕待命」時才出填空題，其他都選擇題
  const useFill=!!battleState.ultArmed;
  battleState.curWord=w;
  if(useFill){
    // 填空模式
    box.style.display='none';
    if(fillArea)fillArea.style.display='block';
    const fs=makeFillSentence(w);
    battleState.fillBlank=fs.blank;
    // 句子顯示在題目區，空格標紅
    document.getElementById('battle-q-text').innerHTML='<div style="font-size:13px;color:#aee0ff;margin-bottom:4px;">'+w.trans+'</div>'+fs.sentence.replace('______','<span style="color:#ffd86b;border-bottom:2px dashed #ffd86b;padding:0 6px;">____</span>');
    const inp=document.getElementById('battle-fill-input');
    if(inp){inp.value='';setTimeout(()=>inp.focus(),100);}
  }else{
    // 選擇題模式
    box.style.display='grid';
    if(fillArea)fillArea.style.display='none';
    document.getElementById('battle-q-text').innerText=w.trans;
    box.innerHTML='';
    let wrongs=pickDistractors(w,3);
    let opts=[...wrongs,w].sort(()=>Math.random()-.5);
    opts.forEach(o=>{
      const btn=document.createElement('button');
      btn.style.cssText='padding:13px 8px;border:1.5px solid #4a3a5a;border-radius:11px;background:#241830;color:#fff;font-size:14px;font-weight:700;cursor:pointer;word-break:break-word;transition:all .15s;';
      btn.innerText=o.word;
      btn.dataset.correct=o.id===w.id?'1':'0';
      btn.onclick=()=>battleAnswer(o.id===w.id,btn,w,box);
      box.appendChild(btn);
    });
  }
  startBattleTimer(w,box);
}

function battleAnswerFill(correct){
  clearBattleTimer();
  const w=battleState.curWord;
  if(correct){
    if(w&&w.word)say(w.word);
    if(battleState.ultArmed){
      battleState.ultArmed=false;battleState.energy=0;updateEnergyUI();
      battleState.combo=(battleState.combo||0)+1;
      if(battleState.combo>(game.bestCombo||0))game.bestCombo=battleState.combo;
      updateComboUI();ultimateAttack();
    }else heroAttack();
  }else{
    if(w)markWrong(w.id);
    if(battleState.combo>0){battleState.combo=0;updateComboUI();}
    if(battleState.ultArmed){battleState.ultArmed=false;battleState.energy=0;updateEnergyUI();toast('大絕落空了！');}
    if(w&&w.word)setTimeout(()=>say(w.word),400);
    monsterAttack();
  }

function battleAnswer(correct,btn,word,box){
  clearBattleTimer();
  Array.from(box.children).forEach(b=>{b.style.pointerEvents='none';});
  if(correct){
    btn.style.background='#39b54a';btn.style.borderColor='#39b54a';
    if(word&&word.word)say(word.word);
    if(battleState.ultArmed){
      // 大絕命中！
      battleState.ultArmed=false;
      battleState.energy=0;updateEnergyUI();
      battleState.combo=(battleState.combo||0)+1;
      if(battleState.combo>(game.bestCombo||0))game.bestCombo=battleState.combo;
      updateComboUI();
      ultimateAttack();
    }else{
      heroAttack();
    }
  }else{
    btn.style.background='#c0392b';btn.style.borderColor='#c0392b';
    if(word)markWrong(word.id);
    if(battleState.combo>0){battleState.combo=0;updateComboUI();}
    // 大絕答錯 → 能量歸零浪費掉
    if(battleState.ultArmed){
      battleState.ultArmed=false;
      battleState.energy=0;updateEnergyUI();
      toast('大絕落空了！');
    }
    Array.from(box.children).forEach(b=>{
      if(b.dataset.correct==='1'){
        b.style.background='#39b54a';b.style.borderColor='#39b54a';
        if(word&&word.word)setTimeout(()=>say(word.word),400);
      }
    });
    monsterAttack();
  }
}
function heroAttack(){
  const ms=document.getElementById('monster-sprite');
  const hs=document.getElementById('hero-sprite');
  const hw=document.getElementById('hero-wrap');
  const monLv=battleState.monLv;
  const diff=monLv-game.level;
  let dmg=20*weaponPower(game.weapon);
  if(diff>0)dmg=dmg*(1-Math.min(diff*0.04,0.45));
  // 連擊加成：每combo +12%，最多+120%
  battleState.combo=(battleState.combo||0)+1;
  const comboMul=1+Math.min(battleState.combo-1,10)*0.12;
  dmg=Math.round(dmg*comboMul);
  battleState.heroDmg=dmg;
  // 充能
  battleState.energy=Math.min(100,(battleState.energy||0)+18);
  if(battleState.combo>(game.bestCombo||0)){game.bestCombo=battleState.combo;}
  updateComboUI();updateEnergyUI();
  const wt=weaponType(game.weapon);
  petAttackAnim();
  const dealDamage=()=>{
    battleState.monHp=Math.max(0,battleState.monHp-dmg);
    sfxHit();monsterHurt();updateBars();showDamage(dmg,'monster','#ffd86b');
    const mw=document.getElementById('monster-wrap');
    if(mw){mw.style.transition='transform .15s';const base=battleState.isBoss||battleState.revenge?'translateX(-50%) scale(1.3)':'translateX(-50%)';mw.style.transform=base+' translateX(-14px)';setTimeout(()=>{if(mw)mw.style.transform=base;},180);}
    gameOnCorrect();
    // 寵物補血
    const heal=petHealPerCorrect();
    if(heal>0&&battleState.heroHp<battleState.heroMaxHp&&battleState.heroHp>0){
      battleState.heroHp=Math.min(battleState.heroMaxHp,battleState.heroHp+heal);
      updateBars();showDamage(heal,'hero','#8be08b');
    }
    if(battleState.monHp<=0)setTimeout(monsterDie,500);
    else setTimeout(showNextBtn,700);
  };
  if(wt==='sword'||wt==='axe'){
    // 近戰：衝過去揮砍
    if(hw){hw.style.transition='transform .38s ease';hw.style.transform='translateX(50%) translateX(-150px)';}
    setTimeout(()=>{
      if(hs)hs.innerHTML=heroSprite(game.skin,game.level,'attack',65,game.weapon);
      spawnMeleeFx(wt);
      setTimeout(()=>{
        dealDamage();
        if(hw)hw.style.transform='translateX(50%)';
        if(hs)setTimeout(()=>{if(hs)hs.innerHTML=heroSprite(game.skin,game.level,'idle',65,game.weapon);},350);
      },420);
    },380);
  }else{
    // 遠程：原地出手 → 投射物飛過去
    if(hs)hs.innerHTML=heroSprite(game.skin,game.level,'attack',65,game.weapon);
    spawnRangedFx(wt);
    setTimeout(()=>{
      dealDamage();
      if(hs)setTimeout(()=>{if(hs)hs.innerHTML=heroSprite(game.skin,game.level,'idle',65,game.weapon);},300);
    },620);
  }
}

function monsterDie(){
  clearBattleTimer();
  const ms=document.getElementById('monster-sprite');
  const mw=document.getElementById('monster-wrap');
  if(ms)ms.innerHTML=monsterSprite(battleState.monLv,'die');
  if(mw){mw.style.transition='transform .5s, opacity .5s';mw.style.transform='translateX(-50%) translateY(20px)';mw.style.opacity='0';}
  // 獎勵
  let reward=battleState.revenge?40:(battleState.isBoss?50:5);
  reward+=Math.min(battleState.combo||0,10)*2;
  game.coins+=reward;
  if(battleState.revenge){
    // 克服弱點：把復仇池的單字降級（dunno->delta, delta->circle）
    (battleState.revengePool||[]).forEach(rw=>{
      const t=words.find(x=>x.id===rw.id);
      if(t){if(t.status==='dunno')t.status='delta';else if(t.status==='delta')t.status='circle';}
    });
    toast(`💀 戰勝夢魘！弱點單字已強化 +${reward}幣`);
  }else{
    toast(battleState.isBoss?`👑 擊敗 BOSS！+${reward}幣`:`🎉 擊敗 ${MONSTER_ZH[battleState.monLv-1]}！+${reward}幣`);
    if(battleState.floor>=game.floor){game.floor=battleState.floor+1;if(game.floor>100)game.floor=100;}
  }
  saveGame();refreshHUD();
  document.getElementById('battle-q').style.display='none';
  const comboNote=(game.bestCombo>1)?`<div style="text-align:center;color:#aee0ff;font-size:11px;margin-bottom:6px;">最高連擊 ${battleState.combo||0} ｜ 紀錄 ${game.bestCombo}</div>`:'';
  const winBtns=battleState.revenge
    ?'<button onclick="backToBed()" style="width:100%;background:linear-gradient(135deg,#c0392b,#8a1f15);color:#ffe9a8;border:none;padding:12px;border-radius:11px;font-weight:800;cursor:pointer;">↩ 回村莊</button>'
    :'<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;"><button onclick="goDeeper()" style="background:linear-gradient(135deg,#c0392b,#8a1f15);color:#ffe9a8;border:none;padding:12px;border-radius:11px;font-weight:800;cursor:pointer;">▶ 繼續挑戰</button><button onclick="backToBed()" style="background:#2a1e38;color:#c9b8e8;border:1px solid #4a3a5a;padding:12px;border-radius:11px;font-weight:700;cursor:pointer;">↩ 回村莊</button></div>';
  document.getElementById('game-buttons').innerHTML=comboNote+'<div style="text-align:center;color:#ffd86b;font-weight:800;font-size:15px;margin-bottom:10px;">⭐ 勝利！</div>'+winBtns;
}

function startRevenge(){
  // 收集最常錯的單字（dunno 最優先，再 delta）
  const wrongWords=words.filter(w=>w.status==='dunno'||w.status==='delta');
  if(wrongWords.length<4){toast('錯題不足4個，多做幾題填空吧！');return;}
  battleState.revenge=true;
  battleState.revengePool=wrongWords.sort((a,b)=>{
    const sa=a.status==='dunno'?2:1,sb=b.status==='dunno'?2:1;return sb-sa;
  });
  // 夢魘怪：用最高層的造型，血量中等但攻擊高
  const monLv=Math.min(Math.max(game.level+5,15),100);
  battleState.floor=monLv;battleState.monLv=monLv;battleState.isBoss=true;
  battleState.monMaxHp=180;battleState.monHp=180;
  battleState.heroMaxHp=100;battleState.heroHp=100;
  battleState.monDmg=18;battleState.combo=0;
  if(battleState.energy===undefined)battleState.energy=0;
  const mw=document.getElementById('monster-wrap');
  if(mw){mw.style.opacity='1';mw.style.transform='translateX(-50%)';mw.style.scale='1.3';}
  const hw=document.getElementById('hero-wrap');
  if(hw){hw.style.opacity='1';hw.style.transform='translateX(50%)';}
  const ms=document.getElementById('monster-sprite');
  if(ms){ms.innerHTML=monsterSprite(monLv,'idle');ms.style.filter='hue-rotate(280deg) saturate(1.5)';}
  const hs=document.getElementById('hero-sprite');
  if(hs){hs.innerHTML=heroSprite(game.skin,game.level,'idle',65);hs.style.filter='';}
  setT('monster-name','💀 夢魘怪（你的弱點）');
  setT('battle-hero-lv',game.level);
  setStageBg(60);
  showScene('battle');updatePetSprite();updateBars();updateComboUI();updateEnergyUI();
  nextBattleQuestion();
  document.getElementById('battle-q').style.display='block';
  document.getElementById('game-buttons').innerHTML='<div style="color:#ff8a9a;font-size:10px;font-weight:600;text-align:center;padding:3px;">💀 夢魘怪：用你最常錯的單字考你</div>';
}

  el.style.cssText='position:absolute;left:60%;top:44%;pointer-events:none;animation:slashArc .45s ease forwards;';

function isStarterWeapon(i){return i===0||i===6||i===12||i===18;}
function weaponCost(i){if(isStarterWeapon(i))return 0;const sub=i%6;return sub*120+80;}
function weaponUnlockLv(i){if(isStarterWeapon(i))return 1;const sub=i%6;return sub*6;}
function skinCost(i){return i===0?0:60+i*i*8;} // 越後面越貴（平方成長）
function skinUnlockLv(i){return 1;} // 造型純花錢，不限等級
// 稀有造型需成就解鎖
function skinAchLocked(i){
  if(i===29)return (game.floor||1)<40;   // 炎魔王 需地城40層
  if(i===20)return (game.floor||1)<20;   // 炎之王者 需地城20層
  if(i===15)return (game.level||1)<15;   // 黃金聖騎 需Lv.15
  return false;
}
// 武器強化
function weaponUpgradeLv(i){return (game.weaponLevels&&game.weaponLevels[i])||0;}
function weaponUpgradeCost(i){return 100+weaponUpgradeLv(i)*120;}
function upgradeWeapon(i){
  const lv=weaponUpgradeLv(i);
  if(lv>=5){toast('已強化滿級 +5！');return;}
  const c=weaponUpgradeCost(i);
  if(game.coins<c){toast('題數幣不足！');return;}
  game.coins-=c;
  if(!game.weaponLevels)game.weaponLevels={};
  game.weaponLevels[i]=lv+1;saveGame();refreshHUD();renderShopItems();
  toast('⚒️ '+WEAPONS[i]+' 強化到 +'+(lv+1)+'！傷害提升');
}

// ===== 複習 =====
function buildPool(){
  let f=[...words];
  pool=[];
  if(rFilter==='⚡ 錯題優先'){
    let wrong=f.filter(w=>w.status==='dunno'||w.status==='delta');
    if(wrong.length===0){pool=[];rStats();return;}
    wrong.forEach(w=>{let n=w.status==='dunno'?6:3;for(let i=0;i<n;i++)pool.push({...w});});
    pool.sort(()=>Math.random()-.5);rStats();return;
  }
  if(rFilter==='★ 重點')f=f.filter(w=>w.star);
  else if(rFilter!=='全部')f=f.filter(w=>w.tag===rFilter);
  f.forEach(w=>{
    let n=w.status==='dunno'?5:w.status==='delta'?2:w.status==='new'?1:0;
    for(let i=0;i<n;i++)pool.push({...w});
  });
  if(pool.length===0&&f.length>0){f.forEach(w=>{let t=words.find(x=>x.id===w.id);if(t&&t.status==='circle')t.status='new';pool.push({...w});});save();}
  pool.sort(()=>Math.random()-.5);
  rStats();
}
function rStats(){
  if(rFilter==='⚡ 錯題優先'){
    document.getElementById('rstats').innerText=pool.length===0?'🎉 錯題都複習完了！':'⚡ 錯題複習中 ｜ 還有 '+pool.length+' 張';
  }else{
    document.getElementById('rstats').innerText='待複習 '+pool.length+' 張 ｜ 總庫存 '+words.length;
  }
}
function nextCard(animate){
  if(pool.length===0&&words.length>0)buildPool();
  const cardEl=document.getElementById('review-card');
  const doNext=()=>{
    if(pool.length===0){render({word:'此分類沒有卡片',pronounce:'-',trans:'-',tag:'-',part:'-'});cur=null;return;}
    cur=pool.shift();render(cur);rStats();
    if(animate){cardEl.classList.remove('slide-in');void cardEl.offsetWidth;cardEl.classList.add('slide-in');setTimeout(()=>cardEl.classList.remove('slide-in'),200);}
  };
  if(animate){
    cardEl.classList.add('slide-out');
    setTimeout(()=>{cardEl.classList.remove('slide-out');doNext();},180);
  }else{doNext();}
}
function render(w){
  document.getElementById('c-word').innerText=w.word;
  document.getElementById('c-pron').value=w.pronounce||'未填寫';
  document.getElementById('c-trans').innerText=w.trans;
  document.getElementById('c-tag').innerText=w.tag||'';
  document.getElementById('c-part').innerText=w.part||'';
}
function score(type){
  if(!cur)return;
  const msgs={circle:'太棒了！繼續！',dunno:'沒關係，會多練',delta:'加油！'};
  toast(msgs[type]);
  let t=words.find(w=>w.id===cur.id);if(t){t.status=type;save();}
  reviewHistory.push(cur);
  if(type==='dunno'){for(let i=0;i<3;i++)pool.push({...cur});pool.sort(()=>Math.random()-.5);}
  nextCard('left');
}
function prevCard(){
  if(reviewHistory.length===0){toast('已經是第一張了');return;}
  if(cur)pool.unshift(cur);
  cur=reviewHistory.pop();
  const cardEl=document.getElementById('review-card');
  cardEl.classList.add('slide-out-right');
  setTimeout(()=>{cardEl.classList.remove('slide-out-right');render(cur);rStats();cardEl.classList.add('slide-in-left');setTimeout(()=>cardEl.classList.remove('slide-in-left'),200);},180);
}
function renderFilter(type){
  const bar=document.getElementById(type==='review'?'rfilter':'lfilter');
  const cur2=type==='review'?rFilter:lFilter;
  bar.innerHTML='';
  const mk=(label,val)=>{const b=document.createElement('button');b.className='fbtn'+(cur2===val?' active':'');b.innerText=label;b.onclick=()=>selFilter(type,val);bar.appendChild(b);};
  mk('全部','全部');
  if(type==='review'){const wc=words.filter(w=>w.status==='dunno'||w.status==='delta').length;if(wc>0)mk('⚡ 錯題優先('+wc+')','⚡ 錯題優先');}
  mk('★ 重點','★ 重點');
  tagTypes.forEach(t=>{if(words.some(w=>w.tag===t))mk(t,t);});
}
function selFilter(type,val){
  if(type==='review'){rFilter=val;buildPool();nextCard();}
  else{lFilter=val;renderList();}
  renderFilter(type);
}

const QT=['choice','type','fill'];
function resetQuizSession(){qTotal=0;qCorrect=0;qTypeIdx=0;wrongList=[];updateWrongLog();}

// 找出跟正解最容易搞混的干擾選項
function pickDistractors(w,count){
  // 用文字去重，避免出現多個一樣的選項
  const seen={};seen[w.word.toLowerCase()]=1;
  const others=[];
  words.forEach(x=>{
    const key=x.word.toLowerCase();
    if(key===w.word.toLowerCase())return;
    if(seen[key])return;
    seen[key]=1;others.push(x);
  });
  // 相似度評分：詞性相同、分類相同、長度接近、開頭/結尾字母相同、都是數字
  const isNum=s=>/^\d|one|two|three|four|five|six|seven|eight|nine|ten|teen|ty$|hundred|thousand/i.test(s)||/\d/.test(s);
  const wNum=isNum(w.word);
  const wLen=w.word.length;
  const wFirst=w.word[0]?.toLowerCase();
  const wLast=w.word[w.word.length-1]?.toLowerCase();
  const wHasSpace=w.word.includes(' ');
  const scored=others.map(o=>{
    let s=0;
    if(o.part===w.part)s+=4;          // 同詞性
    if(o.tag===w.tag)s+=3;            // 同分類
    if(isNum(o.word)===wNum&&wNum)s+=5; // 都是數字
    if(o.word.includes(' ')===wHasSpace)s+=2; // 都是句子/都是單字
    if(Math.abs(o.word.length-wLen)<=2)s+=2;  // 長度接近
    if(o.word[0]?.toLowerCase()===wFirst)s+=2; // 同開頭
    if(o.word[o.word.length-1]?.toLowerCase()===wLast)s+=1; // 同結尾
    s+=Math.random()*1.5; // 加一點隨機避免每次都一樣
    return {o,s};
  });
  scored.sort((a,b)=>b.s-a.s);
  return scored.slice(0,count).map(x=>x.o);
}
function buildChoices(w){
  const g=document.getElementById('q-choices');g.innerHTML='';
  let wrongs=pickDistractors(w,3);
  let opts=[...wrongs,w].sort(()=>Math.random()-.5);
  opts.forEach(o=>{
    const b=document.createElement('button');
    b.className='choice';b.innerText=o.word;
    b.addEventListener('click',()=>pickChoice(b,o.id===w.id,w.word,g));
    g.appendChild(b);
  });
}
function pickChoice(btn,ok,correct,g){
  if(qAnswered)return;qAnswered=true;qTotal++;
  document.getElementById('q-dunno').style.display='none';
  Array.from(g.children).forEach(b=>{b.style.pointerEvents='none';if(b.innerText===correct)b.classList.add('reveal');});
  if(ok){
    btn.classList.remove('reveal');btn.classList.add('correct');
    toast('答對了！');qCorrect++;mark(qCur.id,'circle');gameOnCorrect();
    say(correct);
  }else{
    btn.classList.add('wrong');toast('答錯！');mark(qCur.id,'delta');requeue(qCur,2);addWrong(qCur,btn.innerText,correct);
    setTimeout(()=>say(correct),500);
  }
  qStats();setTimeout(nextQuiz,1400);
}
function buildFill(w){
  let s=w.word.trim();
  if(s.includes(' ')){
    let a=s.split(/\s+/);let i=Math.floor(Math.random()*a.length);
    qFill=a[i].replace(/[.,/#!$%^&*;:{}=\-_`~()?]/g,'');a[i]='_____';
    document.getElementById('q-question').innerText=a.join(' ');
  }else{
    if(s.length<=1){qFill=s;document.getElementById('q-question').innerText='_';return;}
    let i=Math.floor(Math.random()*s.length);qFill=s[i];
    let a=s.split('');a[i]='_';document.getElementById('q-question').innerText=a.join('');
  }
}

function mark(id,st){let t=words.find(w=>w.id===id);if(t){t.status=st;save();}}
function markWrong(id){ // 答錯：狀態降級 + 答錯次數+1
  let t=words.find(w=>w.id===id);
  if(t){
    if(t.status==='circle')t.status='delta';else t.status='dunno';
    t.wrongCnt=(t.wrongCnt||0)+1;
    save();
  }
}
function markDunnoOnly(id){ // 我不會：狀態設 dunno + 我不會次數+1（與答錯分開算）
  let t=words.find(w=>w.id===id);
  if(t){
    t.status='dunno';
    t.dunnoCnt=(t.dunnoCnt||0)+1;
    save();
  }
}

const V_TPL=[
  {e:"I want to {w} today.",z:"我今天想{t}。"},
  {e:"Can you teach me how to {w}?",z:"你能教我怎麼{t}嗎？"},
  {e:"Let's {w} together after work.",z:"下班後一起{t}吧。"},

  {e:"We should {w} more often.",z:"我們應該更常{t}。"}
];
const N_TPL=[
  {e:"I need a good {w}.",z:"我需要一個好的{t}。"},
  {e:"Where can I find the {w}?",z:"我在哪裡可以找到{t}？"},
  {e:"This {w} is really nice.",z:"這個{t}真的很棒。"},
  {e:"I forgot to bring my {w} today.",z:"我今天忘了帶{t}。"},
  {e:"Do you have a {w}?",z:"你有{t}嗎？"}
];
const A_TPL=[
  {e:"This is so {w}.",z:"這真是太{t}了。"},
  {e:"You look really {w} today.",z:"你今天看起來很{t}。"},
  {e:"That was surprisingly {w}.",z:"那出乎意料地{t}。"},
  {e:"Everything here feels so {w}.",z:"這裡一切都感覺好{t}。"}
];
function escReg(s){return s.split('').map(c=>'.*+?^${}()|[]\\'.includes(c)?'\\'+c:c).join('');}

async function genSentence(){
  const btn=document.getElementById('gen-btn');
  btn.disabled=true;btn.innerText='⏳ 生成中...';
  const provider=localStorage.getItem('gm_ai_provider')||'template';
  const apiKey=localStorage.getItem('gm_apikey')||'';
  const pickable=words.filter(w=>['動詞','名詞','形容詞'].includes(w.part)&&!w.word.includes(' '));
  if(pickable.length<1){toast('先新增一些單字');btn.disabled=false;btn.innerText='✨ 生成例句';return;}
  const w=pickable[Math.floor(Math.random()*pickable.length)];
  if(provider==='claude'&&apiKey.startsWith('sk-ant')){
    await genWithClaude(w,apiKey,btn);
  }else if(provider==='gemini'&&apiKey.startsWith('AIza')){
    await genWithGemini(w,apiKey,btn);
  }else{
    if(provider!=='template')toast('Key 無效，使用內建模板');
    genWithTemplate(w,btn);
  }
}
async function genWithClaude(w,apiKey,btn){
  try{
    const prompt='You are an English teacher. Create ONE simple sentence using "'+w.word+'" ('+w.part+': '+w.trans+').\nReply ONLY in this format:\nENG: [sentence]\nZH: [Chinese translation]\nPRON: [Chinese phonetic]';
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:200,messages:[{role:'user',content:prompt}]})
    });
    const data=await res.json();
    const text=data.content?.[0]?.text||'';
    const engM=text.match(/ENG:\s*(.+)/);const zhM=text.match(/ZH:\s*(.+)/);const pronM=text.match(/PRON:\s*(.+)/);
    if(engM&&zhM){showSentence(w,engM[1].trim(),zhM[1].trim(),pronM?pronM[1].trim():'',btn,'Claude');}
    else{genWithTemplate(w,btn);}
  }catch(err){genWithTemplate(w,btn);}
}
async function genWithGemini(w,apiKey,btn){
  try{
    const prompt='You are an English teacher. Create ONE simple sentence using "'+w.word+'" ('+w.part+': '+w.trans+').\nReply ONLY in this format:\nENG: [sentence]\nZH: [Chinese translation]\nPRON: [Chinese phonetic]';
    const url='https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key='+apiKey;
    const res=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contents:[{parts:[{text:prompt}]}]})});
    const data=await res.json();
    const text=data.candidates?.[0]?.content?.parts?.[0]?.text||'';
    const engM=text.match(/ENG:\s*(.+)/);const zhM=text.match(/ZH:\s*(.+)/);const pronM=text.match(/PRON:\s*(.+)/);
    if(engM&&zhM){showSentence(w,engM[1].trim(),zhM[1].trim(),pronM?pronM[1].trim():'',btn,'Gemini');}
    else{genWithTemplate(w,btn);}
  }catch(err){genWithTemplate(w,btn);}
}
function genWithTemplate(w,btn){
  const tpls=w.part==='名詞'?N_TPL:w.part==='形容詞'?A_TPL:V_TPL;
  const tpl=tpls[Math.floor(Math.random()*tpls.length)];
  const lw=w.word.charAt(0).toLowerCase()+w.word.slice(1);
  const eng=tpl.e.replace('{w}',lw);
  const engCap=eng.charAt(0).toUpperCase()+eng.slice(1);
  const zh=tpl.z.replace('{t}',w.trans);
  showSentence(w,engCap,zh,w.pronounce||w.word,btn,'模板');
}
function showSentence(w,eng,zh,pron,btn,source){
  lastGen=w;lastGenSent=eng;lastGenZh=zh;
  const hl=eng.replace(new RegExp('\\b'+escReg(w.word)+'\\b','i'),m=>'<span class="hl">'+m+'</span>');
    const sentOut=document.getElementById('sent-out');
  sentOut.innerHTML='';
  const card1=document.createElement('div');card1.className='sent-card';
  card1.innerHTML='<div class="label">AI 例句 <span style="color:#9ca3af;font-size:9px;">('+source+')</span></div><div class="sent-eng">'+hl+'</div>';
  const spkBtn=document.createElement('button');spkBtn.className='spk';spkBtn.innerText='🔊';
  spkBtn.addEventListener('click',()=>say(eng));
  card1.querySelector('.sent-eng').appendChild(spkBtn);
  const card2=document.createElement('div');card2.className='sent-card';
  card2.innerHTML='<div class="label">中文意思</div><div class="sent-zh">'+zh+'</div>';
  const card3=document.createElement('div');card3.className='sent-card';
  card3.innerHTML='<div class="label">空耳唸法</div><div class="sent-zh"><b>'+pron+'</b></div>';
  const card4=document.createElement('div');card4.className='sent-card';
  card4.innerHTML='<div class="label">核心單字</div><div class="sent-zh"><b>'+w.word+'</b>（'+w.part+'）= '+w.trans+'</div>';
  sentOut.appendChild(card1);sentOut.appendChild(card2);sentOut.appendChild(card3);sentOut.appendChild(card4);
  document.getElementById('sent-add').style.display='block';
  btn.disabled=false;btn.innerText='✨ 生成例句';
  setTimeout(()=>say(eng),200);
}

  if(!lastGen||!lastGenSent)return;
  if(words.some(w=>w.word.toLowerCase()===lastGenSent.toLowerCase())){toast('這句已存過');return;}

// ===== 分類管理 =====
function manageTags(){
  const inp=prompt('目前分類：\n'+tagTypes.join('、')+'\n\n輸入新分類名稱新增\n輸入「-名稱」刪除（例：-數字）');
  if(!inp||!inp.trim())return;
  const s=inp.trim();
  if(s.startsWith('-')){
    const name=s.slice(1).trim();
    if(!tagTypes.includes(name)){alert('找不到「'+name+'」');return;}
    const used=words.filter(w=>w.tag===name).length;
    if(used>0){if(!confirm('「'+name+'」有 '+used+' 個單字，刪除後移到「生活」，確定？'))return;words.forEach(w=>{if(w.tag===name)w.tag='生活';});}
    tagTypes=tagTypes.filter(t=>t!==name);
  }else{
    if(tagTypes.includes(s)){alert('已有這個分類');return;}
    tagTypes.push(s);
  }
  save();toast('分類已更新');updateTagOpts();renderFilter('list');renderList();
}

// 為單字生成一個帶空格的句子
function blankWordInSentence(sentence,target){
  // 在句子中把 target 單字挖空（不分大小寫，整字比對）
  const re=new RegExp('\\b'+target.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'\\b','i');
  if(re.test(sentence)){
    return {sentence:sentence.replace(re,'______'),blank:target};
  }
  return null;
}
function makeFillSentence(w){
  const word=(w.word||'').trim();
  // 1) 這個字本身就是句子/片語（收藏的AI例句或清單句子）→ 挖掉最長的關鍵字
  if(word.includes(' ')){
    const parts=word.split(' ');
    let idx=0,maxLen=0;
    parts.forEach((p,i)=>{const clean=p.replace(/[^a-zA-Z]/g,'');if(clean.length>maxLen){maxLen=clean.length;idx=i;}});
    const blank=parts[idx].replace(/[^a-zA-Z]/g,'');
    const display=parts.map((p,i)=>i===idx?p.replace(/[a-zA-Z]+/,'______'):p).join(' ');
    return {sentence:display,blank:blank};
  }
  // 2) 單字 → 找一個「收藏例句或清單裡含這個字」的句子來挖空
  const sentWords=words.filter(x=>x.word&&x.word.includes(' '));
  // 先找剛好包含這個單字的句子
  const shuffled=sentWords.sort(()=>Math.random()-.5);
  for(const s of shuffled){
    const r=blankWordInSentence(s.word,word);
    if(r)return r;
  }
  // 3) 連句子都沒有 → 退回單字填空（用簡單模板，空格就是這個字）
  const templates=[
    'Type the word: ______',
    '______  ('+w.trans+')',
    'Spell it: ______'
  ];
  const t=templates[Math.floor(Math.random()*templates.length)];
  return {sentence:t,blank:word};
}
function nextFill(){
  if(words.length<4){document.getElementById('fill-sentence').innerText='請先新增更多單字！';return;}
  // 優先抽錯題，偶爾抽一般
  let pool=words.filter(w=>w.status==='dunno'||w.status==='delta');
  if(pool.length<3||Math.random()<0.4)pool=words;
  fillCur=pool[Math.floor(Math.random()*pool.length)];
  const fs=makeFillSentence(fillCur);
  fillBlank=fs.blank;
  document.getElementById('fill-sentence').innerHTML=fs.sentence.replace('______','<span style="color:#c0392b;font-weight:800;border-bottom:2px dashed #c0392b;padding:0 8px;">______</span>');
  document.getElementById('fill-trans').innerText=fillCur.trans;
  // 選擇題選項
  if(fillMode==='choice'){
    const box=document.getElementById('fill-choices');
    box.innerHTML='';
    const wrongs=pickDistractors(fillCur,3);
    const opts=[...wrongs,fillCur].sort(()=>Math.random()-.5);
    opts.forEach(o=>{
      const btn=document.createElement('button');
      btn.className='choice';
      btn.innerText=o.word.includes(' ')?(o.word.split(' ').reduce((a,b)=>a.replace(/[^a-zA-Z]/g,'').length>b.replace(/[^a-zA-Z]/g,'').length?a:b)).replace(/[^a-zA-Z]/g,''):o.word;
      btn.onclick=()=>answerFill(btn.innerText.toLowerCase()===fillBlank.toLowerCase(),btn);
      box.appendChild(btn);
    });
  }else{
    document.getElementById('fill-answer').value='';
    document.getElementById('fill-result').innerText='';
    document.getElementById('fill-result').className='qresult';
  }
}
function answerFill(correct,btn){
  fillTotal++;
  if(correct){
    fillCorrect++;
    if(btn){btn.style.background='#39b54a';btn.style.color='#fff';}
    say(fillBlank);
    if(fillCur)mark(fillCur.id,'circle');
    gameOnCorrect();
    toast('答對了！');

  }else{
    if(btn){btn.style.background='#c0392b';btn.style.color='#fff';}
    if(fillCur)mark(fillCur.id,'delta');
    toast('正確答案：'+fillBlank);
    say(fillBlank);
    setTimeout(nextFill,1400);
  }
  document.getElementById('fillscore').innerText='本日：'+fillCorrect+' 答對 / '+fillTotal+' 題';
}

// ===== 背景音樂（Web Audio 合成，輕柔循環）=====
let _bgmCtx=null,_bgmOn=false,_bgmTimer=null,_bgmGain=null;
// ===== 音效引擎（共用 AudioContext，純合成、不佔容量）=====
let _sfxCtx=null;
function sfxCtx(){
  if(!_sfxCtx){try{_sfxCtx=new (window.AudioContext||window.webkitAudioContext)();}catch(e){return null;}}
  if(_sfxCtx.state==='suspended')_sfxCtx.resume();
  return _sfxCtx;
}
function tone(freq,dur,type,vol,slideTo){
  const c=sfxCtx();if(!c)return;
  const o=c.createOscillator(),g=c.createGain();
  o.type=type||'sine';o.frequency.value=freq;
  const t=c.currentTime;
  if(slideTo)o.frequency.linearRampToValueAtTime(slideTo,t+dur);
  g.gain.setValueAtTime(0,t);
  g.gain.linearRampToValueAtTime(vol||0.18,t+0.01);
  g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  o.connect(g);g.connect(c.destination);
  o.start(t);o.stop(t+dur+0.02);
}
function noiseBurst(dur,vol){
  const c=sfxCtx();if(!c)return;
  const n=Math.floor(c.sampleRate*dur);
  const buf=c.createBuffer(1,n,c.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<n;i++)d[i]=(Math.random()*2-1)*(1-i/n);
  const src=c.createBufferSource();src.buffer=buf;
  const g=c.createGain();g.gain.value=vol||0.15;
  src.connect(g);g.connect(c.destination);src.start();
}

  else if(p.includes('龍')){tone(160,0.3,'sawtooth',0.18,90);} // 龍吼
  else if(p.includes('鳳')||p.includes('鳥')){tone(1000,0.15,'sine',0.12,1400);} // 鳥鳴
  else if(p.includes('馬')||p.includes('獨角獸')){tone(500,0.18,'sawtooth',0.14,700);} // 嘶
  else if(p.includes('兔')){tone(800,0.1,'sine',0.12,900);} // 啾
  else tone(600,0.15,'sine',0.13,700);
}
function startBGM(){
  if(_bgmOn)return;
  try{
    _bgmCtx=_bgmCtx||new (window.AudioContext||window.webkitAudioContext)();
    if(_bgmCtx.state==='suspended')_bgmCtx.resume();
    _bgmGain=_bgmCtx.createGain();_bgmGain.gain.value=0.08;_bgmGain.connect(_bgmCtx.destination);
    _bgmOn=true;
    // 簡單的循環和弦進行（小聲、緩慢）
    const scale=[261.63,293.66,329.63,392.00,440.00,523.25]; // C大調五聲
    let step=0;
    const playNote=()=>{
      if(!_bgmOn)return;
      const o=_bgmCtx.createOscillator();const g=_bgmCtx.createGain();
      o.type='sine';
      o.frequency.value=scale[Math.floor(Math.random()*scale.length)]/2; // 低八度更柔
      g.gain.value=0;g.connect(_bgmGain);o.connect(g);
      const t=_bgmCtx.currentTime;
      g.gain.linearRampToValueAtTime(0.5,t+0.4);
      g.gain.linearRampToValueAtTime(0,t+2.2);
      o.start(t);o.stop(t+2.3);
      step++;
    };
    playNote();
    _bgmTimer=setInterval(playNote,1700);
  }catch(e){}
}
function stopBGM(){
  _bgmOn=false;
  if(_bgmTimer){clearInterval(_bgmTimer);_bgmTimer=null;}
}
function toggleBGM(){
  if(_bgmOn){stopBGM();game.bgm=false;}
  else{startBGM();game.bgm=true;}
  saveGame();updateBgmBtn();
}
function updateBgmBtn(){
  const b=document.getElementById('bgm-btn');
  if(b)b.innerText=_bgmOn?'♪ 音樂開':'♪ 音樂關';
}

// ===== 初始化 =====
switchView('review');
// 首次互動時若設定為開就啟動背景音樂（iOS 需手勢解鎖）
function _bgmFirstStart(){
  if(game.bgm&&!_bgmOn)startBGM();
  updateBgmBtn();
  document.removeEventListener('touchstart',_bgmFirstStart);
  document.removeEventListener('click',_bgmFirstStart);
}
document.addEventListener('touchstart',_bgmFirstStart,{once:true});
document.addEventListener('click',_bgmFirstStart,{once:true});

</script>
