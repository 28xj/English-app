<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GM 的單字卡</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f0f0f0; margin: 0; padding: 60px 20px 80px 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; color: #333; position: relative; }
        .container { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 16px; }
        .nav { display: flex; gap: 3px; background: #e0e0e0; padding: 4px; border-radius: 14px; width: 100%; }
        .nav button { flex: 1; padding: 12px; border: none; border-radius: 10px; background: transparent; font-size: 13px; font-weight: bold; color: #666; cursor: pointer; }
        .nav button.active { background: white; color: #1a1a1a; box-shadow: 0 2px 6px rgba(0,0,0,0.05); }
        .card-view, .input-view, .list-view, .quiz-view, .sentence-view { background: white; border-radius: 24px; padding: 22px; min-height: 480px; display: flex; flex-direction: column; justify-content: space-between; border: 1px solid #eee; }
        .hidden { display: none !important; }
        .flashcard { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 10px; }
        .card-row { width: 100%; padding: 12px; background: #fafafa; border-radius: 14px; border: 1px solid #eaeaea; }
        .label-text { font-size: 11px; color: #999; text-transform: uppercase; margin-bottom: 4px; font-weight: bold; }
        .word-present { font-size: 24px; font-weight: bold; }
        .inline-edit-pronounce { width: 100%; border: none; background: transparent; text-align: center; font-size: 16px; font-weight: bold; color: #555; }
        .btn-submit { background: #333; color: white; border: none; padding: 16px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; }
        .footer-signature { position: absolute; bottom: 15px; font-size: 12px; color: #999; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div class="nav">
            <button id="nav-review" class="active" onclick="switchView('review')">複習</button>
            <button id="nav-quiz" onclick="switchView('quiz')">測驗</button>
            <button id="nav-sentence" onclick="switchView('sentence')">造句</button>
            <button id="nav-add" onclick="switchView('add')">新增</button>
            <button id="nav-list" onclick="switchView('list')">清單</button>
        </div>

        <div id="view-review" class="card-view">
            <div class="flashcard">
                <div class="card-row"><div class="label-text">單字</div><div class="word-present" id="card-word">請新增單字</div></div>
                <div class="card-row"><div class="label-text">空耳 (點擊可改)</div><input type="text" id="card-pronounce" class="inline-edit-pronounce" value="-"></div>
            </div>
            <button class="btn-submit" onclick="nextCard()">下一張</button>
        </div>

        <div id="view-quiz" class="quiz-view hidden">
            <div class="flashcard">
                <div class="label-text" id="quiz-hint">測驗提示</div>
                <div class="word-present" id="quiz-question">準備中...</div>
            </div>
            <button class="btn-submit" onclick="nextQuiz()">下一題</button>
        </div>

        <div id="view-sentence" class="sentence-view hidden">
            <div class="flashcard"><div class="word-present">聯網功能請先輸入 AI Key</div></div>
            <button class="btn-submit" onclick="alert('請先輸入 Gemini Key')">開始造句</button>
        </div>

        <div id="view-add" class="input-view hidden">
            <div class="form-container">
                <input type="text" id="in-word" placeholder="英文單字">
                <input type="text" id="in-pronounce" placeholder="空耳唸法">
                <input type="text" id="in-trans" placeholder="中文意思">
                <button class="btn-submit" onclick="saveWord()">儲存單字</button>
            </div>
        </div>

        <div id="view-list" class="list-view hidden">
            <div id="list-container">清單列表...</div>
        </div>
    </div>
    <div class="footer-signature">開發者：台中最帥老闆J</div>

    <script>
        // 初始化引擎
        let words = JSON.parse(localStorage.getItem('gm_words_v3')) || [{id:1, word:"Work", pronounce:"沃克", trans:"工作"}];
        
        function switchView(v) {
            document.querySelectorAll('.card-view, .quiz-view, .sentence-view, .input-view, .list-view').forEach(e => e.classList.add('hidden'));
            document.getElementById('view-'+v).classList.remove('hidden');
            document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
            document.getElementById('nav-'+v).classList.add('active');
        }
        
        function nextCard() {
            if(words.length > 0) {
                let w = words[0];
                document.getElementById('card-word').innerText = w.word;
                document.getElementById('card-pronounce').value = w.pronounce;
            }
        }
        
        function nextQuiz() {
            document.getElementById('quiz-question').innerText = "開始測驗";
            document.getElementById('quiz-hint').innerText = "提示：動詞";
        }

        function saveWord() {
            let newWord = { id: Date.now(), word: document.getElementById('in-word').value, pronounce: document.getElementById('in-pronounce').value, trans: document.getElementById('in-trans').value };
            words.push(newWord);
            localStorage.setItem('gm_words_v3', JSON.stringify(words));
            alert("儲存成功！");
            switchView('review');
            nextCard();
        }

        // 啟動指令
        switchView('review');
        nextCard();
    </script>
</body>
</html>
